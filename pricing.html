<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>運が馬を引き寄せる！ プレミアム会員</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #100c08; color: #e8e8f0; min-height: 100vh; }
  .hero { background: linear-gradient(135deg, #1e1610 0%, #16213e 50%, #2a1a08 100%); padding: 60px 20px; text-align: center; border-bottom: 1px solid #3a2e1e; }
  .logo { font-size: 2.5rem; font-weight: bold; color: #c8911a; margin-bottom: 10px; }
  .logo span { color: #fff; }
  .tagline { font-size: 1.1rem; color: #a0a0c0; margin-bottom: 30px; }
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
  h2 { font-size: 1.8rem; text-align: center; margin-bottom: 10px; color: #fff; }
  .subtitle { text-align: center; color: #a0a0c0; margin-bottom: 40px; }
  .plans { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 50px; }
  @media (max-width: 600px) { .plans { grid-template-columns: 1fr; } }
  .plan { background: #1e1610; border: 1px solid #3a2e1e; border-radius: 16px; padding: 32px 24px; position: relative; }
  .plan.featured { border-color: #c8911a; }
  .featured-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #c8911a; color: #100c08; font-size: 12px; font-weight: bold; padding: 4px 16px; border-radius: 20px; }
  .plan-name { font-size: 1.1rem; color: #a0a0c0; margin-bottom: 8px; }
  .plan-price { font-size: 2.4rem; font-weight: bold; color: #fff; margin-bottom: 4px; }
  .plan-price span { font-size: 1rem; color: #a0a0c0; font-weight: normal; }
  .plan-desc { font-size: 0.9rem; color: #a0a0c0; margin-bottom: 24px; }
  .features { list-style: none; margin-bottom: 28px; }
  .features li { padding: 8px 0; border-bottom: 1px solid #3a2e1e; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
  .features li:last-child { border-bottom: none; }
  .check { color: #c8911a; font-weight: bold; }
  .cross { color: #555; }
  .btn { display: block; width: 100%; padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: bold; text-align: center; text-decoration: none; cursor: pointer; border: none; }
  .btn-primary { background: #c8911a; color: #100c08; }
  .btn-primary:hover { background: #e0a832; }
  .btn-secondary { background: transparent; color: #a0a0c0; border: 1px solid #3a2e1e; }
  .how { background: #1e1610; border-radius: 16px; padding: 32px; margin-bottom: 40px; }
  .how h3 { font-size: 1.3rem; margin-bottom: 20px; color: #c8911a; }
